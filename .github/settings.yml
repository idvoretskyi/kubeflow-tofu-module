repository:
  name: kubeflow-tofu-module
  description: OpenTofu module for deploying Kubeflow on any Kubernetes cluster
  homepage: ""
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

labels:
  - name: bug
    color: d73a4a
    description: Something isn't working
  - name: dependencies
    color: 0366d6
    description: Pull requests that update a dependency file
  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation
  - name: enhancement
    color: a2eeef
    description: New feature or request
  - name: good first issue
    color: 7057ff
    description: Good for newcomers
  - name: help wanted
    color: 008672
    description: Extra attention is needed
  - name: security
    color: b60205
    description: Security hardening or vulnerability work
