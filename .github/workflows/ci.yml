name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  opentofu-sanity:
    name: OpenTofu Sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: latest

      - name: Check formatting
        run: tofu fmt -check -recursive

      - name: Initialize (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate
